title: FedSalary - Global Government Salary Database
homepage: https://fedsalary.com
category: SocialSciences
description: |
  Verified federal and national government employee pay tables for 17 countries
  (US OPM GS/SES/FS/JUD, UK Cabinet Office SCS, Canadian Treasury Board core
  public service, Australian APSC, Japanese Jinjiin, Korean civil service,
  German BBesG/TVoeD, Brazilian SIAPE, Indian CPC, and others). Approximately
  19,000 verified pay cells. Every cell is anchored to the country's
  authoritative compensation publisher with a SHA256 source manifest. Annual
  base salary by grade and step, with the primary-source URL and retrieval
  date for each cell. Refreshed annually via an automated fetch-and-validate
  pipeline.
